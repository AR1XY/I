<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR1XY Space</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Общие стили для темной темы */
        :root {
            --bg: #0d0d0f; /* Глубокий черный фон */
            --card: rgba(255, 255, 255, 0.05); /* Прозрачные карточки */
            --accent: #0088cc; /* Фирменный синий Telegram */
            --ton-accent: #0098ea; /* Фирменный синий TON */
            --text: #ffffff;
            --text-dim: #9ca3af;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding-top: 60px; /* Отступ сверху для мобильных */
        }

        .container {
            width: 90%;
            max-width: 400px; /* Идеальная ширина для телефона */
            text-align: center;
        }

        /* Стильная аватарка с градиентом и свечением */
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 25px;
            overflow: hidden; /* Чтобы изображение не вылезало за края */
            border: 3px solid rgba(255, 255, 255, 0.1); /* Тонкая рамка */
            box-shadow: 0 0 25px rgba(0, 136, 204, 0.4); /* Свечение */
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Изображение заполнит круг, не искажаясь */
        }

        h1 { font-size: 26px; margin: 10px 0 5px; font-weight: 800; }
        .description { color: var(--text-dim); margin-bottom: 35px; font-size: 16px; }

        /* Карточки-ссылки */
        .card {
            background: var(--card);
            backdrop-filter: blur(15px); /* Эффект матового стекла */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 22px;
            margin-bottom: 18px;
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
        }

        /* Эффект при нажатии */
        .card:active {
            transform: scale(0.96);
            background: rgba(255, 255, 255, 0.08);
        }

        /* Кнопка доната */
        .donate-btn {
            background: var(--ton-accent);
            color: white;
            padding: 16px;
            border-radius: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: bold;
            margin-top: 10px;
            width: 100%; /* На всю ширину карточки */
            transition: opacity 0.2s;
        }

        .donate-btn:active { opacity: 0.8; }

        /* Иконки */
        .icon { font-size: 24px; color: var(--accent); }
        .icon-ton { font-size: 24px; color: var(--ton-accent); }

        /* Текст в футере */
        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-dim);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="avatar">
            <img src="IMG_20260503_090548_399.jpg" alt="AR1XY">
        </div>
        <h1>AR1XY</h1>
        <p class="description">Digital Creator & TON enthusiast</p>

        <a href="https://t.me/odwob" class="card">
            <i class="fab fa-telegram icon"></i>
            <div style="font-weight: 500;">Мой Telegram</div>
        </a>

        <div class="card">
            <i class="fa-solid fa-gem icon-ton"></i>
            <div style="margin-bottom: 5px; font-weight: bold;">Поддержать автора</div>
            <p style="font-size: 13px; color: var(--text-dim); margin-bottom: 15px;">Донат в TON через Crypto Bot</p>
            <a href="http://t.me/send?start=IVhsZKupZNYf" class="donate-btn">
                <i class="fa-solid fa-bolt"></i> Отправить Crypto
            </a>
        </div>

        <div class="footer-text">MADE WITH MOBILE</div>
    </div>

</body>
</html>
